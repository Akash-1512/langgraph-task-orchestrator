# .github/workflows/ragas-quality-gate.yml
# Runs RAGAS evaluation on PRs to develop and main
# Fails the PR if faithfulness drops below 0.75

name: RAGAS Quality Gate

on:
  pull_request:
    branches: [ develop, main ]

jobs:
  ragas-eval:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install langchain-chroma fastembed ragas datasets

      - name: Run RAGAS quality gate
        run: python -m evaluation.ragas_eval
        env:
          LLM_PROVIDER: groq
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GROQ_MODEL: llama-3.3-70b-versatile
          VECTOR_STORE: chroma