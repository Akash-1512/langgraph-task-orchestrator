# .github/workflows/ci.yml
# Runs on every push and PR
# Unit tests use FakeListChatModel — zero tokens consumed
# Integration tests (real LLM) run on schedule only

name: CI — Test Suite

on:
  push:
    branches: [develop, main, "feature/**", "fix/**"]
  pull_request:
    branches: [develop, main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install langchain-chroma fastembed langgraph-checkpoint-sqlite

      - name: Run unit tests (mocked LLM — zero tokens)
        run: |
          python -m tests.test_state
          python -m tests.test_llm_client
          python -m tests.test_planner
          python -m tests.test_analytics
          python -m tests.test_critique
        env:
          LLM_PROVIDER: groq
          VECTOR_STORE: chroma
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

      - name: Run research agent tests
        run: python -m tests.test_research
        env:
          LLM_PROVIDER: groq
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GROQ_MODEL: llama-3.1-8b-instant
          VECTOR_STORE: chroma

      # Integration tests (real LLM) run on schedule only
      # See .github/workflows/integration-tests.yml

      - name: Run DeepEval quality gate
        run: deepeval test run evaluation/test_deepeval.py
        env:
          LLM_PROVIDER: groq
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GROQ_MODEL: llama-3.1-8b-instant
          VECTOR_STORE: chroma