# docker-compose.yml
# Run the full stack locally for demo purposes
# Usage: docker-compose up --build

version: "3.9"

services:
  api:
    build: .
    container_name: okr-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./chroma_db:/app/chroma_db  # Persist vector store across restarts
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/ping"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  ui:
    build: .
    container_name: okr-ui
    command: streamlit run ui/app.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      - API_URL=http://api:8000  # Internal Docker network — ui talks to api service
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped